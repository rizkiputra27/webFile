<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shared Files</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Shared Files</h1>
        <p class="text-slate-500 text-sm mt-1">Files and folders shared via Google Drive.</p>
      </div>
      <a href="/admin" class="text-sm text-slate-400 hover:text-indigo-600 transition">Admin</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-10">

    <div id="loadingState" class="text-center text-slate-400 py-16">
      Loading files...
    </div>

    <div id="emptyState" class="hidden text-center text-slate-400 py-16">
      No files have been shared yet.
    </div>

    <div id="errorState" class="hidden text-center text-red-500 py-16">
      Failed to load files. Please refresh the page.
    </div>

    <div id="fileGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

  </main>

<script>
  const loadingState = document.getElementById('loadingState');
  const emptyState = document.getElementById('emptyState');
  const errorState = document.getElementById('errorState');
  const fileGrid = document.getElementById('fileGrid');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function iconFor(type) {
    if (type === 'folder') {
      return `<svg class="w-6 h-6 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h4l2 2h6a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>`;
    }
    return `<svg class="w-6 h-6 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>`;
  }

  function renderFiles(files) {
    if (!files || files.length === 0) {
      loadingState.classList.add('hidden');
      emptyState.classList.remove('hidden');
      return;
    }

    fileGrid.innerHTML = files
      .map(
        (f) => `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col justify-between hover:shadow-md transition">
          <div class="flex items-start gap-3 mb-4">
            <div class="shrink-0 bg-slate-50 rounded-lg p-2">${iconFor(f.type)}</div>
            <div class="min-w-0">
              <h2 class="font-semibold text-slate-800 truncate" title="${escapeHtml(f.filename)}">${escapeHtml(f.filename)}</h2>
              <p class="text-xs uppercase tracking-wide text-slate-400 mt-0.5">${escapeHtml(f.type || 'file')}</p>
            </div>
          </div>
          <a
            href="${escapeHtml(f.downloadUrl)}"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition"
          >
            Download
          </a>
        </div>`
      )
      .join('');

    loadingState.classList.add('hidden');
    fileGrid.classList.remove('hidden');
  }

  async function loadFiles() {
    try {
      // Cache-busting timestamp param avoids Vercel's aggressive edge caching.
      const res = await fetch('/api/files?t=' + new Date().getTime());
      if (!res.ok) throw new Error('Bad response');
      const files = await res.json();
      renderFiles(files);
    } catch (err) {
      loadingState.classList.add('hidden');
      errorState.classList.remove('hidden');
    }
  }

  loadFiles();
</script>

</body>
</html>
